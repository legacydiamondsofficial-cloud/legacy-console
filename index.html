<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#f6f3ee"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<link rel="manifest" href="manifest.json"/>
<title>Legacy</title>
<style>
  :root{
    --bg:#f6f3ee; --card:#fff; --ink:#211e1a; --ink2:#5b554c; --mut:#9a9387;
    --line:#ece6db; --gold:#a8842f; --gold-soft:#f3ebd6; --send:#2f8f5b; --kill:#c0473b;
    --sh:0 1px 2px rgba(30,25,15,.05),0 6px 20px rgba(30,25,15,.06);
    --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;touch-action:pan-y;overscroll-behavior-y:none;-webkit-user-select:none;user-select:none}
  .serif{font-family:Georgia,"Times New Roman",serif}
  .app{max-width:640px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
  /* header */
  header{position:sticky;top:0;z-index:20;background:rgba(246,243,238,.86);backdrop-filter:saturate(1.4) blur(12px);
    padding:calc(var(--safe-t) + 14px) 20px 12px;border-bottom:1px solid var(--line)}
  .htop{display:flex;align-items:center;gap:10px}
  .wm{font-family:Georgia,serif;font-size:20px;letter-spacing:.34em;text-transform:uppercase}
  .wm b{color:var(--gold);font-weight:400}
  .mode{font:700 9px/1 sans-serif;letter-spacing:.1em;padding:4px 7px;border-radius:6px;border:1px solid var(--line);color:var(--mut)}
  .mode.live{color:var(--send);border-color:#bfe0cd;background:#eef7f1} .mode.demo{color:var(--gold);border-color:var(--gold-soft);background:var(--gold-soft)}
  .whoami{margin-left:auto;display:none;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--ink)}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:Georgia,serif}
  .signout{font-size:12px;color:var(--mut);border:1px solid var(--line);padding:7px 11px;border-radius:9px;background:var(--card)}
  h1{font-family:Georgia,serif;font-weight:400;font-size:27px;margin:14px 0 2px;letter-spacing:-.01em}
  .count{font-size:13px;color:var(--mut)}
  .count b{color:var(--ink)} .count .s{color:var(--send)}
  /* search + filters */
  .tools{padding:12px 16px 4px}
  .search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;font-size:16px;color:var(--ink);box-shadow:var(--sh)}
  .search::placeholder{color:var(--mut)}
  .pills{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pillwrap{position:relative}
  .pillfade{position:absolute;top:0;right:0;width:42px;height:100%;pointer-events:none;background:linear-gradient(90deg,rgba(246,243,238,0),var(--bg) 72%);transition:opacity .2s}
  .pill{flex:none;background:var(--card);border:1px solid var(--line);color:var(--ink2);padding:9px 16px;border-radius:22px;font-size:14px;font-weight:500}
  .pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  /* list */
  .list{padding:8px 16px calc(120px + var(--safe-b))}
  .card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin:11px 0;box-shadow:var(--sh);transition:transform .08s}
  .card:active{transform:scale(.985)}
  .strike{flex:none;width:52px;height:52px;border-radius:14px;background:var(--gold-soft);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .strike b{font-family:Georgia,serif;font-size:22px;color:var(--gold);line-height:1}
  .strike small{font:600 8px/1 sans-serif;letter-spacing:.1em;color:#b89a55;margin-top:2px}
  .who{flex:1;min-width:0}
  .nm{font-size:17px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--mut);flex:none}
  .dot.approved{background:var(--send)} .dot.killed{background:var(--kill)}
  .meta{font-size:13.5px;color:var(--mut);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .t{font-size:11px;font-weight:600;letter-spacing:.02em;padding:3px 9px;border-radius:7px;background:#f3f0ea;color:var(--ink2)}
  .t.send{background:#eef7f1;color:var(--send)} .t.world{background:#f1ecf6;color:#7d5ca3}
  .chev{flex:none;color:#cfc8ba;font-size:20px}
  .empty{text-align:center;color:var(--mut);font-family:Georgia,serif;font-style:italic;padding:70px 24px;font-size:16px}
  /* FAB */
  .fab{position:fixed;right:max(18px,calc((100vw - 640px)/2 + 18px));bottom:calc(22px + var(--safe-b));z-index:30;
    width:56px;height:56px;border-radius:50%;background:var(--gold);color:#fff;border:0;font-size:26px;box-shadow:0 8px 24px rgba(168,132,47,.4);display:flex;align-items:center;justify-content:center}
  /* sheet (detail + tip + login share) */
  .scrim{position:fixed;inset:0;background:rgba(28,24,18,.32);z-index:40;opacity:0;pointer-events:none;transition:.2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:640px;margin:0 auto;background:var(--bg);
    border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .26s cubic-bezier(.22,.7,.3,1);
    max-height:94vh;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(28,24,18,.18)}
  .sheet.show{transform:translateY(0)}
  .grab{width:40px;height:5px;border-radius:3px;background:#dcd5c8;margin:10px auto 0;flex:none}
  .sheethead{flex:none;padding:2px 20px 6px;background:var(--bg)}
  .sheethead:empty{display:none}
  .sbody{flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px 20px 20px}
  .world-tag{display:inline-block;font-family:Georgia,serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);background:var(--gold-soft);border-radius:7px;padding:5px 11px;margin:8px 0 12px}
  .navbar{display:flex;align-items:center;justify-content:space-between;padding:2px 0 0;color:var(--mut);font-size:13px;font-weight:600;letter-spacing:.04em}
  .navbar span:first-child,.navbar span:last-child{font-size:28px;color:var(--gold);min-width:48px;height:40px;display:flex;align-items:center;justify-content:center;line-height:1}
  .dname{font-family:Georgia,serif;font-weight:400;font-size:30px;margin:0 0 4px;letter-spacing:-.01em}
  .dsrc{font-size:13px;color:var(--mut);margin-bottom:8px}
  .sec{border-top:1px solid var(--line);padding:16px 0}
  .sec h4{margin:0 0 12px;font:700 11px/1 sans-serif;letter-spacing:.13em;color:var(--mut);text-transform:uppercase}
  .bl{display:flex;align-items:center;gap:10px;margin:8px 0}
  .bl .l{width:92px;font-size:13px;color:var(--ink2);text-transform:capitalize}
  .bl .tr{flex:1;height:8px;background:#efeae0;border-radius:5px;overflow:hidden}
  .bl .fl{height:100%;background:var(--gold);border-radius:5px}
  .bl .v{width:26px;text-align:right;font-size:14px;font-weight:600;color:var(--gold)}
  .quote{font-family:Georgia,serif;font-style:italic;color:#3c372f;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);padding:13px 15px;border-radius:0 12px 12px 0;font-size:15px;line-height:1.55}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;font-size:15px;border-bottom:1px solid #f1ece2}
  .kv:last-child{border:0} .kv span{color:var(--mut)}
  .door{font-size:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0;word-break:break-all}
  .door .dd{color:var(--mut);font-size:12px;margin-top:3px}
  .actions{flex:none;display:flex;gap:10px;padding:14px 20px calc(16px + var(--safe-b));border-top:1px solid var(--line);background:var(--bg)}
  .act{flex:1;padding:15px;border-radius:14px;border:0;font-size:15px;font-weight:700;background:#efeae0;color:var(--ink)}
  .act.appr{background:var(--send);color:#fff} .act.kill{background:#fbeeec;color:var(--kill)}
  .act:active{opacity:.85}
  .tipwrap{padding:6px 20px 4px}
  .tipwrap input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;font-size:16px;margin-bottom:10px}
  /* login */
  .login{position:fixed;inset:0;z-index:90;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px}
  .login.show{display:flex}
  .login .lwm{font-family:Georgia,serif;font-size:30px;letter-spacing:.34em;text-transform:uppercase;margin-bottom:6px}
  .login .lwm b{color:var(--gold);font-weight:400}
  .login .lt{color:var(--mut);font-family:Georgia,serif;font-style:italic;margin-bottom:28px;font-size:15px}
  .login .box{width:100%;max-width:340px}
  .login input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px;font-size:16px;margin:7px 0}
  .login button{width:100%;background:var(--gold);color:#fff;border:0;border-radius:13px;padding:16px;font-size:16px;font-weight:700;margin-top:12px}
  .login .err{color:var(--kill);font-size:13px;text-align:center;min-height:18px;margin-top:8px}
  .login .demo{display:block;text-align:center;color:var(--mut);font-size:13px;margin-top:18px}
  .toast{position:fixed;left:50%;bottom:calc(90px + var(--safe-b));transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;
    padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:70;opacity:0;transition:.22s;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="htop">
      <div class="wm">Leg<b>a</b>cy</div>
      <span class="mode demo" id="mode">…</span>
      <span class="whoami" id="whoami"></span>
      <button class="signout" id="signout" style="display:none">Sign out</button>
    </div>
    <h1 class="serif">The Morning Queue</h1>
    <div class="count"><b id="c-total">–</b> in queue · <b class="s" id="c-send">–</b> sendable · <b id="c-appr">–</b> approved</div>
  </header>
  <div class="tools"><input class="search" id="q" placeholder="Search name, company, sector"/></div>
  <div class="pillwrap">
    <div class="pills" id="pills">
      <span class="pill on" data-f="all">All</span>
      <span class="pill" data-f="sendable">Sendable</span>
      <span class="pill" data-f="queued">Queued</span>
      <span class="pill" data-f="approved">Approved</span>
      <span class="pill" data-f="event">Event</span>
      <span class="pill" data-f="affinity">Affinity</span>
    </div>
    <div class="pillfade" id="pillfade"></div>
  </div>
  <div class="list" id="list"></div>
</div>

<button class="fab" id="fab" title="Add tip">＋</button>
<div class="toast" id="toast"></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sheethead" id="sheethead"></div>
  <div class="sbody" id="sbody"></div>
</div>

<div class="login" id="login">
  <div class="lwm">Leg<b>a</b>cy</div>
  <div class="lt">The Morning Queue — private access</div>
  <div class="box">
    <input id="li-email" type="email" placeholder="Email" autocomplete="username" autocapitalize="none"/>
    <input id="li-pw" type="password" placeholder="Password" autocomplete="current-password"/>
    <button id="li-go">Enter</button>
    <div class="err" id="li-err"></div>
    <span class="demo" id="li-demo">Continue in demo mode →</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://datmpoiomjaegwfmssja.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhdG1wb2lvbWphZWd3Zm1zc2phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NzUwMzksImV4cCI6MjA5NjU1MTAzOX0.QRYfiEHePtAiM9iocdJUp3fpE7XSdx5KiTe4X68EpJE';
let sb=null; try{ if(window.supabase) sb=window.supabase.createClient(SB_URL,SB_ANON); }catch(e){}
let LEADS=[], VIEW=[], filter='all', q='', selId=null, MODE='demo';
const ov=JSON.parse(localStorage.getItem('legacy_overrides')||'{}');
const $=id=>document.getElementById(id);
const fmtUSD=n=>n==null?null:'$'+(Math.abs(n)>=1e9?(n/1e9).toFixed(1)+'B':Math.abs(n)>=1e6?(n/1e6).toFixed(1)+'M':(n/1e3).toFixed(0)+'k');
const tc=s=>(s||'').replace(/_/g,' ');
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function world(l){const w=(l.extraction&&(l.extraction.holdings_usd||l.extraction.fec_total_usd))||0;if(l.strike_score>=72||w>=5e8)return 'Circle';if(l.strike_score>=55)return 'Icon';return 'Era';}
function source(l){const c=l.category||'',b=l.score_breakdown||{};if(b.source==='fec'||c==='political_donation')return 'FEC';if(c==='institutional_sale')return 'EDGAR institutional';if(c==='insider_sale')return 'SEC EDGAR';if(c==='wealth_signal')return 'Wealth signal';return c?tc(c):'—';}
function status(l){return MODE==='demo'?(ov[l.id]||l.status):l.status;}
function sendable(l){return ((l.contact_paths||{}).verification||{}).sendable===true;}
function setMode(m){MODE=m;const e=$('mode');e.textContent=m==='live'?'● LIVE':'DEMO';e.className='mode '+m;$('signout').style.display=m==='live'?'inline-block':'none';}

function render(){
  const el=$('list');el.innerHTML='';
  let rows=LEADS.filter(l=>{const st=status(l);
    if(filter==='queued'&&st!=='queued')return false;
    if(filter==='approved'&&st!=='approved')return false;
    if(filter==='sendable'&&!sendable(l))return false;
    if(filter==='event'&&(l.score_breakdown||{}).lane!=='event')return false;
    if(filter==='affinity'&&(l.score_breakdown||{}).lane!=='affinity')return false;
    if(q&&!((l.display_name+' '+((l.extraction||{}).company||'')+' '+l.sector).toLowerCase().includes(q)))return false;
    return true;});
  VIEW=rows;
  $('c-total').textContent=LEADS.filter(l=>status(l)==='queued').length;
  $('c-send').textContent=LEADS.filter(l=>sendable(l)).length;
  $('c-appr').textContent=LEADS.filter(l=>status(l)==='approved').length;
  if(!rows.length){el.innerHTML='<div class="empty">'+(MODE==='demo'?'Sign in to load your live queue.':'No leads match.')+'</div>';return;}
  rows.forEach(l=>{const b=l.score_breakdown||{},st=status(l),ex=l.extraction||{};
    const company=ex.company||(l.tags&&l.tags.includes('fec-donor')?(ex.employer||''):'');
    const c=document.createElement('div');c.className='card';c.onclick=()=>open(l.id);
    c.innerHTML=`<div class="strike"><b>${l.strike_score}</b><small>STRIKE</small></div>
      <div class="who"><div class="nm"><span class="dot ${st}"></span>${esc(l.display_name||l.full_name)}</div>
      <div class="meta">${esc([l.sector,company,[l.city,l.country].filter(Boolean).join(', ')].filter(Boolean).join(' · '))}</div>
      <div class="tags"><span class="t world">${world(l)}</span>${sendable(l)?'<span class="t send">● Sendable</span>':''}<span class="t">${source(l)}</span></div></div>
      <div class="chev">›</div>`;
    el.appendChild(c);});
}
function open(id){selId=id;const l=LEADS.find(x=>x.id===id);if(!l)return;const idx=VIEW.findIndex(x=>x.id===id);
  const b=l.score_breakdown||{},ex=l.extraction||{},cp=l.contact_paths||{},v=cp.verification||{};
  const comps=b.lane==='event'?[['wealth',b.wealth],['occasion',b.occasion],['propensity',b.propensity],['timing',b.timing]]:[['wealth',b.wealth],['affinity',b.affinity],['reachability',b.reachability],['recency',b.recency]];
  const take=ex.personal_take_usd||ex.fec_total_usd,hold=ex.holdings_usd,st=status(l);
  const doors=(cp.channels||[]).map(c=>`<div class="door">${esc(c.value)}<div class="dd">${esc((c.status||'').toUpperCase())} · ${esc(c.note||c.type)}</div></div>`).join('')||'<div class="dd" style="color:var(--mut)">No doors resolved yet.</div>';
  $('sheethead').innerHTML = idx>=0 ? `<div class="navbar"><span onclick="nav(-1)">${idx>0?'‹':''}</span><span>${idx+1} of ${VIEW.length} · swipe</span><span onclick="nav(1)">${idx<VIEW.length-1?'›':''}</span></div>` : '';
  $('sbody').innerHTML=`
    <div class="world-tag">The Legacy ${world(l)}</div>
    <div class="dname serif">${esc(l.display_name||l.full_name)}</div>
    <div class="dsrc">${esc([l.sector,ex.company].filter(Boolean).join(' · '))} · ${source(l)} · ${esc(l.full_name)}</div>
    <div class="sec"><h4>Strike ${l.strike_score} — ${b.lane||''} lane</h4>
      ${comps.map(([k,val])=>`<div class="bl"><span class="l">${k}</span><span class="tr"><span class="fl" style="width:${Math.min(100,(val||0)/40*100)}%"></span></span><span class="v">${val??'–'}</span></div>`).join('')}</div>
    <div class="sec"><h4>The trigger</h4><div class="quote">${esc(ex.rationale||'—')}</div>
      <div style="margin-top:12px"><div class="kv"><span>Event</span>${tc(l.event_type||l.category||'—')}</div>
      ${take?`<div class="kv"><span>${l.tags&&l.tags.includes('fec-donor')?'Signal size':'Personal take'}</span>${fmtUSD(take)}</div>`:''}
      ${hold?`<div class="kv"><span>Holdings</span>${fmtUSD(hold)}</div>`:''}
      <div class="kv"><span>Detected</span>${(l.detected_at||'').slice(0,10)||'—'}</div></div></div>
    <div class="sec"><h4>Suggested angle</h4><div class="kv"><span>Segment</span>${tc(l.segment||'—')}</div><div class="kv"><span>Angle</span>${esc(l.pitch_angle||'—')}</div></div>
    <div class="sec"><h4>Contact doors ${sendable(l)?'· <span style="color:var(--send)">sendable</span>':'· <span style="color:var(--mut)">not yet</span>'}</h4>
      ${doors}${v.note?`<div class="dd" style="margin-top:8px;color:var(--mut)">${esc(v.note)}</div>`:''}</div>
    <div class="actions">
      <button class="act appr" onclick="act('${l.id}','approved')">${st==='approved'?'✓ Approved':'Approve'}</button>
      <button class="act" onclick="toast('Feature-invite draft queued')">Draft invite</button>
      <button class="act kill" onclick="act('${l.id}','killed')">Kill</button></div>`;
  showSheet(true);
}
let _pushed=false,_bypop=false;
function showSheet(s){$('sheet').classList.toggle('show',s);$('scrim').classList.toggle('show',s);if(!s){$('sheet').dataset.tip='';}
  if(s){if(!_pushed){history.pushState({m:1},'');_pushed=true;}}
  else{if(_pushed&&!_bypop){_bypop=true;history.back();}}}
window.addEventListener('popstate',()=>{_pushed=false;if(_bypop){_bypop=false;return;}if($('sheet').classList.contains('show'))showSheet(false);});
async function act(id,s){const l=LEADS.find(x=>x.id===id);if(l)l.status=s;
  if(MODE==='live'&&sb){const{error}=await sb.rpc('lead_action',{p_lead_id:id,p_status:s});toast(error?'Save failed':(s==='approved'?'Approved':'Killed'));}
  else{ov[id]=s;localStorage.setItem('legacy_overrides',JSON.stringify(ov));toast(s==='approved'?'Approved (demo)':'Killed (demo)');}
  showSheet(false);render();}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}
function openTip(){$('sheethead').innerHTML='';$('sbody').innerHTML=`<div class="world-tag">Tip-line</div><div class="dname serif" style="font-size:24px">Add a lead</div>
  <div class="dsrc">Paste any public URL — a profile, article, or filing. The engine resolves it.</div>
  <div class="tipwrap" style="padding-left:0;padding-right:0"><input id="tipurl" placeholder="https://…" type="url" autocapitalize="none"/></div>
  <div class="actions" style="padding-left:0;padding-right:0;border:0"><button class="act appr" onclick="sendTip()">Submit</button><button class="act" onclick="showSheet(false)">Cancel</button></div>`;
  showSheet(true);setTimeout(()=>{try{$('tipurl').focus();}catch(e){}},250);}
async function sendTip(){const u=($('tipurl')||{}).value?.trim();if(!u)return;
  if(MODE==='live'&&sb){const{error}=await sb.rpc('submit_tip',{p_url:u});toast(error?'Tip failed':'Tip saved for resolution');}else toast('Tip queued (demo)');
  showSheet(false);}

function _pillFade(){const e=$('pills'),f=$('pillfade');if(e&&f)f.style.opacity=(e.scrollLeft+e.clientWidth>=e.scrollWidth-4)?'0':'1';}
$('pills').querySelectorAll('.pill').forEach(p=>p.onclick=()=>{$('pills').querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));p.classList.add('on');filter=p.dataset.f;
  const c=$('pills'),cr=c.getBoundingClientRect(),pr=p.getBoundingClientRect();c.scrollLeft=Math.max(0,c.scrollLeft+(pr.left-cr.left)-(c.clientWidth-pr.width)/2);_pillFade();
  render();});
$('pills').addEventListener('scroll',_pillFade);setTimeout(_pillFade,300);
$('q').oninput=e=>{q=e.target.value.toLowerCase();render();};
$('scrim').onclick=()=>showSheet(false);
$('fab').onclick=openTip;
function nav(d){if(!$('sheet').classList.contains('show'))return;const i=VIEW.findIndex(x=>x.id===selId);if(i<0)return;const n=i+d;if(n<0||n>=VIEW.length)return;open(VIEW[n].id);$('sbody').scrollTop=0;}
let _sx=0,_sy=0;
$('sheet').addEventListener('touchstart',e=>{const t=e.changedTouches[0];_sx=t.clientX;_sy=t.clientY;},{passive:true});
$('sheet').addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-_sx,dy=t.clientY-_sy;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4)nav(dx<0?1:-1);},{passive:true});
document.addEventListener('keydown',e=>{if(!$('sheet').classList.contains('show'))return;if(e.key==='ArrowRight')nav(1);else if(e.key==='ArrowLeft')nav(-1);else if(e.key==='Escape')showSheet(false);});
$('signout').onclick=async()=>{if(sb)await sb.auth.signOut();location.reload();};

function nameFrom(u){return (u&&u.user_metadata&&(u.user_metadata.full_name||u.user_metadata.name))||((u&&u.email||'').split('@')[0].split('+')[0].split('.')[0].replace(/^./,c=>c.toUpperCase()))||'You';}
async function showWho(){try{const{data:{user}}=await sb.auth.getUser();if(user){const nm=nameFrom(user);const w=$('whoami');w.innerHTML='<span class="avatar">'+((nm[0]||'•').toUpperCase())+'</span>'+nm;w.style.display='flex';}}catch(e){}}
async function loadLive(){await showWho();const{data,error}=await sb.from('morning_queue').select('*');if(error){toast('Live load failed');return loadDemo();}LEADS=data||[];setMode('live');render();}
async function loadDemo(){$('whoami').style.display='none';const d=await fetch('leads.json').then(r=>r.json()).catch(()=>[]);LEADS=d;setMode('demo');render();}
$('li-go').onclick=async()=>{const e=$('li-email').value.trim(),p=$('li-pw').value;$('li-err').textContent='';
  if(!sb){$('li-err').textContent='Offline — try again on the live link.';return;}
  $('li-go').textContent='…';const{error}=await sb.auth.signInWithPassword({email:e,password:p});$('li-go').textContent='Enter';
  if(error){$('li-err').textContent=error.message;return;}$('login').classList.remove('show');await loadLive();};
$('li-pw').addEventListener('keydown',e=>{if(e.key==='Enter')$('li-go').click();});
$('li-demo').onclick=()=>{$('login').classList.remove('show');loadDemo();};
function showLogin(){$('login').classList.add('show');}

(async()=>{ if(sb){try{const{data:{session}}=await sb.auth.getSession();if(session){await loadLive();return;}}catch(e){} showLogin(); await loadDemo(); } else { await loadDemo(); } })();
</script>
</body>
</html>
